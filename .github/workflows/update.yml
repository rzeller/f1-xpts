name: Update F1 Expected Points

on:
  workflow_dispatch:
  schedule:
    # Fire every hour. The check-schedule step is the source of truth for
    # whether to actually run; almost all firings are no-op gate checks
    # (~5 seconds each). GitHub's schedule events are best-effort — firings
    # can be delayed by tens of minutes or dropped outright — so the gate
    # uses catch-up semantics: any firing inside a window runs the pipeline
    # if that window's update hasn't happened yet, rather than relying on
    # exactly one firing landing in each window.
    - cron: '0 * * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if pipeline should run
        id: check
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timedelta, timezone

          now = datetime.now(timezone.utc)

          with open("public/data/schedule.json") as f:
              schedule = json.load(f)

          # Manual dispatch always runs.
          if os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch":
              print("Manual dispatch — running pipeline")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("should_run=true\n")
                  f.write("run_type=manual\n")
              raise SystemExit(0)

          # Windows run from the moment an update becomes wanted (anchored at
          # start) until the moment it stops being useful (the hard deadline).
          # A window is "satisfied" once the pipeline has produced output at
          # or after its start; unsatisfied open windows are caught up by
          # whichever cron firing arrives next, so a delayed or dropped
          # firing no longer loses the update.
          PRACTICE_DURATION = timedelta(hours=1)
          POST_SESSION_DELAY = timedelta(minutes=15)
          PRE_NEXT_GAP = timedelta(minutes=15)

          def parse(iso):
              return datetime.fromisoformat(iso.replace("Z", "+00:00"))

          def windows_for_race(race):
              """Yield (start, end, run_type, label) windows we want a run inside.

              Three categories:
                1. lead_up_daily — once a day, race−7 through the day before FP1,
                   from 06:00 UTC until the next day's window opens.
                2. pre_weekend   — 2h before FP1 until FP1 starts.
                3. post_<sess>   — 15min after each practice ends, until the
                   next session starts (minus a small gap). The last practice's
                   post-window ends 15min before the first qualifying — picks
                   lock at qualifying (or sprint_qualifying for sprint weekends),
                   so we don't run after that.
              """
              s = race["sessions"]
              fp1 = parse(s["fp1"])

              # Lead-up daily windows: each opens at 06:00 UTC and stays open
              # until the next day's window (or the pre-weekend window) takes
              # over, so a missed 06:00 firing is caught up later that day.
              fp1_day = fp1.replace(hour=0, minute=0, second=0, microsecond=0)
              for delta_days in range(7, 0, -1):
                  day = fp1_day - timedelta(days=delta_days)
                  yield (
                      day + timedelta(hours=6),
                      min(day + timedelta(days=1, hours=6), fp1 - timedelta(hours=2)),
                      "lead_up_daily",
                      f"D-{delta_days} for {race['name']}",
                  )

              # Pre-FP1: opens 2h before FP1, useful until FP1 starts.
              yield (
                  fp1 - timedelta(hours=2),
                  fp1,
                  "pre_weekend",
                  f"Before FP1 for {race['name']}",
              )

              # Practices = ordered list of (key, start_time). Sprint weekends
              # only have FP1; standard weekends have FP1/FP2/FP3 (some
              # Saturday-race formats may skip FP2 or FP3).
              practices = sorted(
                  ((k, parse(v)) for k, v in s.items() if k.startswith("fp")),
                  key=lambda kv: kv[1],
              )

              # Boundary after the last practice = first qualifying session.
              # Sprint weekends: sprint_qualifying. Standard: qualifying.
              if race.get("is_sprint"):
                  last_boundary = parse(s["sprint_qualifying"])
              else:
                  last_boundary = parse(s["qualifying"])

              for i, (key, start) in enumerate(practices):
                  end = start + PRACTICE_DURATION
                  next_start = practices[i + 1][1] if i + 1 < len(practices) else last_boundary
                  yield (
                      end + POST_SESSION_DELAY,
                      next_start - PRE_NEXT_GAP,
                      f"post_{key}",
                      f"After {key.upper()} for {race['name']}",
                  )

          # When the pipeline last produced output. Each run's PR is
          # auto-merged immediately, so the checked-out master copy of
          # latest.json reflects the most recent completed run; a window
          # whose start predates it has already been served.
          last_run = datetime.min.replace(tzinfo=timezone.utc)
          try:
              with open("public/data/latest.json") as f:
                  last_run = parse(json.load(f)["meta"]["generated_at"])
          except (OSError, ValueError, KeyError):
              pass

          candidates = []
          for race in schedule["races"]:
              # Cheap pre-filter: race already finished -> skip.
              if parse(race["sessions"]["race"]) + timedelta(hours=6) < now:
                  continue
              for start, end, rt, label in windows_for_race(race):
                  if start <= now < end and last_run < start:
                      candidates.append((start, end, rt, label))

          should_run = bool(candidates)
          run_type = ""
          if candidates:
              # Overlapping unsatisfied windows (e.g. a missed lead-up day
              # running into the next window): the latest-opening one is the
              # most current, and its run satisfies the earlier ones too.
              start, end, run_type, label = max(candidates, key=lambda c: c[0])
              reason = f"{label} (window {start.isoformat()} → {end.isoformat()})"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"should_run={'true' if should_run else 'false'}\n")
              f.write(f"run_type={run_type}\n")

          if should_run:
              print(f"Pipeline triggered ({run_type}): {reason}")
          else:
              print(
                  f"No unsatisfied run window — skipping "
                  f"(now={now.isoformat()}, last_run={last_run.isoformat()})"
              )
          PYEOF

      - uses: actions/setup-python@v5
        if: steps.check.outputs.should_run == 'true'
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: pip install -r pipeline/requirements.txt

      - name: Install browser
        if: steps.check.outputs.should_run == 'true'
        # patchright drives real Google Chrome (preinstalled on ubuntu-latest,
        # used via channel="chrome"); this installs its bundled Chromium + OS
        # deps as the fallback and for the headful/xvfb path.
        run: python -m patchright install --with-deps chromium

      - name: Run pipeline
        if: steps.check.outputs.should_run == 'true'
        env:
          RUN_TYPE: ${{ steps.check.outputs.run_type }}
          # Dump page HTML + screenshots here when the scraper is blocked, so a
          # failed run leaves a post-mortem (uploaded as an artifact below).
          SCRAPER_DEBUG_DIR: scraper-debug
          # Set repo variable SCRAPER_HEADFUL=1 to run a headful browser under
          # xvfb (stronger anti-bot posture) without a code change.
          SCRAPER_HEADFUL: ${{ vars.SCRAPER_HEADFUL }}
          # Primary CI backend. Oddschecker hard-blocks GitHub's datacenter IPs
          # AND raw residential-proxy pools via Cloudflare, and compliance-heavy
          # unblockers (Bright Data) policy-block gambling domains. Firecrawl's
          # stealth/auto proxy clears both, so the scrape fetches each market
          # page through Firecrawl. Set FIRECRAWL_API_KEY as a repository secret
          # (Settings → Secrets and variables → Actions). Takes precedence over
          # the browser egress options below.
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          # Legacy browser egress options (ignored when FIRECRAWL_API_KEY set;
          # kept for local/self-hosted runs). CDP unblocker, then raw proxy.
          SCRAPER_BROWSER_CDP_URL: ${{ secrets.SCRAPER_BROWSER_CDP_URL }}
          SCRAPER_PROXY_SERVER: ${{ secrets.SCRAPER_PROXY_SERVER }}
          SCRAPER_PROXY_USERNAME: ${{ secrets.SCRAPER_PROXY_USERNAME }}
          SCRAPER_PROXY_PASSWORD: ${{ secrets.SCRAPER_PROXY_PASSWORD }}
        run: |
          if [ -n "$SCRAPER_HEADFUL" ]; then
            xvfb-run -a python pipeline/update.py --output public/data --run-type "$RUN_TYPE"
          else
            python pipeline/update.py --output public/data --run-type "$RUN_TYPE"
          fi

      - name: Upload scraper debug artifacts
        if: always() && steps.check.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: scraper-debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Create PR and merge (triggers Vercel redeploy)
        if: steps.check.outputs.should_run == 'true'
        uses: peter-evans/create-pull-request@v7
        id: create-pr
        with:
          commit-message: "Update: race projections"
          title: "Update: race projections"
          body: "Automated update from pipeline run."
          branch: bot/update-projections
          delete-branch: true
          committer: "F1 Bot <bot@f1xpts.dev>"

      - name: Auto-merge PR
        if: steps.check.outputs.should_run == 'true' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} \
            --squash --delete-branch

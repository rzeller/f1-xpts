name: Scraper Dry Run
on:
  workflow_dispatch:
  push:
    branches:
      - claude/fix-issue-33-xDEjf
    paths:
      - 'pipeline/odds_fetcher.py'
      - 'pipeline/update.py'
      - 'pipeline/requirements.txt'
      - '.github/workflows/scraper-dry-run.yml'

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Install browser
        run: python -m patchright install --with-deps chromium

      - name: Run scraper dry run
        env:
          SCRAPER_HEADFUL: ${{ vars.SCRAPER_HEADFUL }}
          # Remote CDP unblocker (Bright Data Scraping Browser / Browserless /
          # ZenRows, etc.). When set, the scraper connects to this browser
          # instead of launching locally, and the service solves Cloudflare +
          # egresses from a clean IP. This is the CI path — raw residential
          # proxies are hard-blocked by Oddschecker's Cloudflare.
          SCRAPER_BROWSER_CDP_URL: ${{ secrets.SCRAPER_BROWSER_CDP_URL }}
          SCRAPER_PROXY_SERVER: ${{ secrets.SCRAPER_PROXY_SERVER }}
          SCRAPER_PROXY_USERNAME: ${{ secrets.SCRAPER_PROXY_USERNAME }}
          SCRAPER_PROXY_PASSWORD: ${{ secrets.SCRAPER_PROXY_PASSWORD }}
        run: |
          if [ -n "$SCRAPER_HEADFUL" ]; then
            xvfb-run -a python pipeline/update.py --dry-run --debug-dir scraper-debug
          else
            python pipeline/update.py --dry-run --debug-dir scraper-debug
          fi

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: scraper-debug/
          if-no-files-found: ignore
          retention-days: 7

  # Throwaway probe: can Firecrawl fetch one Oddschecker market page past
  # Cloudflare (and without a gambling-domain policy block)? If this succeeds,
  # we wire Firecrawl in as a fetch backend. Remove this job once decided.
  firecrawl-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Probe Oddschecker via Firecrawl
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, json, sys, urllib.request, urllib.error

          key = os.environ.get("FIRECRAWL_API_KEY", "").strip()
          if not key:
              print("NO_KEY: the FIRECRAWL_API_KEY secret is empty — check the secret name")
              sys.exit(1)
          print(f"key present (len={len(key)}, prefix={key[:3]}…)")

          URL = "https://www.oddschecker.com/us/motorsport/formula-one/british-grand-prix/winner"
          # Full 2026 grid surnames — counting how many appear tells us whether
          # the winner grid came back expanded (all 22) or collapsed (~6 favs).
          DRIVERS = ["Russell", "Antonelli", "Leclerc", "Hamilton", "Verstappen",
                     "Lawson", "Norris", "Piastri", "Alonso", "Stroll", "Gasly",
                     "Colapinto", "Albon", "Sainz", "Tsunoda", "Hadjar", "Bearman",
                     "Ocon", "Hulkenberg", "Bortoleto", "Perez", "Bottas"]
          BLOCK_MARKERS = ["you have been blocked", "attention required",
                           "just a moment", "enable javascript and cookies"]
          ENDPOINT = "https://api.firecrawl.dev/v2/scrape"

          def scrape(actions=None):
              payload = {"url": URL, "formats": ["html"],
                         "proxy": "auto", "onlyMainContent": False}
              if actions:
                  payload["actions"] = actions
              req = urllib.request.Request(
                  ENDPOINT, data=json.dumps(payload).encode(), method="POST",
                  headers={"Authorization": f"Bearer {key}",
                           "Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req, timeout=200) as r:
                      return r.status, r.read().decode("utf-8", "replace")
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode("utf-8", "replace")
              except Exception as e:
                  return None, repr(e)

          def analyze(label, status, text):
              print(f"\n=== {label} ===")
              print("HTTP", status)
              if status is None:
                  print("  transport error:", text[:300]); return 0
              try:
                  data = json.loads(text)
              except Exception:
                  print("  non-JSON:", text[:300]); return 0
              if status >= 400:
                  print("  API error:", json.dumps(data)[:600]); return 0
              d = data.get("data", data)
              html = d.get("html") or ""
              low = html.lower()
              found = [n for n in DRIVERS if n.lower() in low]
              print(f"  html length: {len(html)}")
              print(f"  market-bet rows in html: {low.count('data-testid=\"market-bet\"')}")
              print(f"  show-more buttons in html: {low.count('show-more-less')}")
              print(f"  distinct grid drivers found ({len(found)}/22): {found}")
              print(f"  looks blocked: {any(m in low for m in BLOCK_MARKERS)}")
              return len(found)

          # 1) Plain fetch (static snapshot — likely collapsed to ~6 rows).
          plain = analyze("PLAIN fetch", *scrape())

          # 2) Fetch with a pre-capture action: click every "show more" to expand
          #    the lazy-loaded rows, then wait for them to render.
          actions = [
              {"type": "click", "selector": "[data-testid=\"show-more-less\"]", "all": True},
              {"type": "wait", "milliseconds": 2500},
          ]
          expanded = analyze("EXPANDED fetch (click show-more, all)", *scrape(actions))

          print("\n============================================================")
          print(f"plain={plain}/22 drivers   expanded={expanded}/22 drivers")
          # Success = the expanded fetch recovers most/all of the 22-driver grid.
          ok = expanded >= 18
          print("RESULT:", "SUCCESS — Firecrawl actions expand the full grid"
                if ok else "NEEDS WORK — expansion did not yield the full grid")
          print("============================================================")
          sys.exit(0 if ok else 2)
          PYEOF

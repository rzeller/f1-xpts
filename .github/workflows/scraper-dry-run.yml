name: Scraper Dry Run
on:
  workflow_dispatch:
  push:
    branches:
      - claude/fix-issue-33-xDEjf
    paths:
      - 'pipeline/odds_fetcher.py'
      - 'pipeline/update.py'
      - 'pipeline/requirements.txt'
      - '.github/workflows/scraper-dry-run.yml'

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Install browser
        run: python -m patchright install --with-deps chromium

      - name: Run scraper dry run
        env:
          SCRAPER_HEADFUL: ${{ vars.SCRAPER_HEADFUL }}
          # Primary CI backend: Firecrawl fetches each market page past
          # Cloudflare (raw residential proxies are hard-blocked) and without a
          # gambling-domain policy block. When set it takes precedence over the
          # CDP/proxy browser paths; a local browser is used only to parse the
          # returned HTML.
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          # Legacy browser egress options (ignored when FIRECRAWL_API_KEY set).
          SCRAPER_BROWSER_CDP_URL: ${{ secrets.SCRAPER_BROWSER_CDP_URL }}
          SCRAPER_PROXY_SERVER: ${{ secrets.SCRAPER_PROXY_SERVER }}
          SCRAPER_PROXY_USERNAME: ${{ secrets.SCRAPER_PROXY_USERNAME }}
          SCRAPER_PROXY_PASSWORD: ${{ secrets.SCRAPER_PROXY_PASSWORD }}
        run: |
          if [ -n "$SCRAPER_HEADFUL" ]; then
            xvfb-run -a python pipeline/update.py --dry-run --debug-dir scraper-debug
          else
            python pipeline/update.py --dry-run --debug-dir scraper-debug
          fi

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: scraper-debug/
          if-no-files-found: ignore
          retention-days: 7
